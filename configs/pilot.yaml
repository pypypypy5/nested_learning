defaults:
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

model:
  vocab_size: 32000
  dim: 512
  num_layers: 12
  heads: 8
  teach_scale: 0.10
  teach_clip: 5.0
  surprise_threshold: 0.02
  freeze_backbone: false
  self_mod_lr: 0.001
  teach_schedule:
    warmup_steps: 2000
    decay_start: 120000
    decay_duration: 20000
  titan_level:
    name: titan
    update_period: 8
    optimizer_key: titan_opt
  cms_levels:
    - name: cms_fast
      update_period: 1
      optimizer_key: cms_opt
    - name: cms_mid
      update_period: 4
      optimizer_key: cms_opt
    - name: cms_slow
      update_period: 32
      optimizer_key: cms_opt
    - name: cms_ultra
      update_period: 128
      optimizer_key: cms_opt
  optimizers:
    titan_opt:
      type: deep_momentum
      lr: 6.0e-4
      params:
        beta: 0.9
        beta2: 0.999
        # Best-effort paper mapping: rank-1 context projection preconditioner.
        variant: nl_l2_precond
    cms_opt:
      type: deep_momentum
      lr: 3.0e-4
      params:
        beta: 0.9
        beta2: 0.999
        # Best-effort paper mapping: rank-1 context projection preconditioner.
        variant: nl_l2_precond

data:
  source: synthetic
  vocab_size: 32000
  seq_len: 256
  dataset_size: 8192
  batch_size: 2
  num_workers: 0

train:
  algorithm_mode: two_pass_stopgrad_updates
  strict_streaming_contract: false
  online_updates: true
  online_chunk_size: 0
  online_boundary_targets: false
  online_carry_attention_cache: false
  per_layer_teach_signal: true
  steps: 200
  log_interval: 10
  device: "cpu"
  seed: 1337
  deterministic: true
  step_offset: 0
  mixed_precision:
    enabled: false
    dtype: bf16
  compile:
    enable: false
    mode: max-autotune
  checkpoint:
    enable: true
    dir: artifacts/checkpoints/pilot
    save_interval: 1000
    save_last: true
    resume_path: null
    resume_tag: null

optim:
  type: adamw
  lr: 2.5e-4
  weight_decay: 0.02
  fused: false

logging:
  enabled: true
  backend: json
  path: logs/pilot_metrics.json
  project: nested-learning
  run_name: pilot-main
